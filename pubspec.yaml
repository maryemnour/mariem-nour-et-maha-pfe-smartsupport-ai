name: smart_support_ai
description: SaaS intelligent customer support chatbot platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # Supabase
  supabase_flutter: ^2.3.4
  # UI & navigation
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  # Utilities
  uuid: ^4.2.2
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  # Icons & images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.4
  # JSON
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
